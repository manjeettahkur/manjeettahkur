name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually too
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create assets directory
        run: mkdir -p assets

      - name: Stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manjeettahkur
          template: classic
          base: header, activity, community, repositories
          filename: assets/stats.svg
          config_timezone: Australia/Melbourne
          config_padding: 10
          plugin_isocalendar: yes

      - name: Top languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manjeettahkur
          template: classic
          base: ""
          filename: assets/top-langs.svg
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_colors: github

      - name: Streak card (via DenverCoder1)
        run: |
          curl -o assets/streak.svg \
            "https://streak-stats.demolab.com?user=manjeettahkur&theme=github-dark-blue&hide_border=true&ring=00ADD8&fire=5865F2&currStreakLabel=00ADD8"

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
